<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="AI Native Landscape">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f1724"/>
  <!-- Decorative circles -->
  <circle cx="1040" cy="88" r="260" fill="#0a84ff" opacity=".15"/>
  <circle cx="118" cy="552" r="220" fill="#0a84ff" opacity=".1"/>
  <!-- Card frame -->
  <rect x="60" y="60" width="1080" height="510" rx="32" fill="#141b25" stroke="#2f6fb8" stroke-width="1.5"/>
  <!-- Logo icon -->
  <rect x="100" y="100" width="72" height="72" rx="18" fill="#0a84ff"/>
  <path d="M120 148 L136 120l16 28" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="136" cy="142" r="6" fill="none" stroke="#fff" stroke-width="3"/>
  <path d="M128 148h16" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <!-- Title -->
  <text x="100" y="230" fill="#f8fbff" font-family="Inter,Arial,sans-serif" font-size="56" font-weight="800">AI Native Landscape</text>
  <!-- Subtitle -->
  <text x="100" y="290" fill="#b7c4d8" font-family="Inter,Arial,sans-serif" font-size="26">The curated ecosystem map of open-source AI tools, frameworks,</text>
  <text x="100" y="324" fill="#b7c4d8" font-family="Inter,Arial,sans-serif" font-size="26">agents, runtimes and infrastructure.</text>
  <!-- Tags -->
  <text x="100" y="385" fill="#7db8ff" font-family="Inter,Arial,sans-serif" font-size="22">Agents · MCP · RAG · AI Infra · AI Native Tooling</text>
  <!-- Stats -->
  <text x="100" y="440" fill="#d6e2f2" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600">600+ Open Source Projects · 30+ Categories</text>
  <!-- URL -->
  <text x="100" y="520" fill="#7db8ff" font-family="Inter,Arial,sans-serif" font-size="20">landscape.jimmysong.io</text>
  <!-- Bottom accent bar -->
  <rect x="60" y="560" width="1080" height="4" rx="2" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a84ff"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
</svg>
