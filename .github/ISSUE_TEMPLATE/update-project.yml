name: Update project data
description: Report incorrect metadata, category, links, or score signals.
title: "[Update]: "
labels: ["data-update"]
body:
  - type: input
    id: slug
    attributes:
      label: Project slug or URL
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: What should be changed?
      description: Include source links when possible.
    validations:
      required: true
