name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build

  trigger-worker-sync:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if project data changed
        id: detect
        run: |
          PREV_HEAD="HEAD~1"
          # Handle first commit (no parent)
          if ! git rev-parse "$PREV_HEAD" >/dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(git diff --name-only "$PREV_HEAD" "HEAD" -- 'data/projects/' 'data/categories.yaml')
          if [ -n "$DIFF" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Project data changes:"
            echo "$DIFF"

            # Extract slugs from changed project files
            SLUGS=""
            for f in $DIFF; do
              slug=$(basename "$f" | sed 's/\.\(en\|zh\)\.md$//')
              case "$SLUGS" in
                *"$slug"*) ;;
                *) SLUGS="${SLUGS:+$SLUGS }$slug" ;;
              esac
            done
            echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"
            echo "Changed slugs: $SLUGS"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No project data changes, skipping worker sync."
          fi

      - name: Wait for Cloudflare Pages deployment
        if: steps.detect.outputs.changed == 'true'
        run: |
          SLUGS="${{ steps.detect.outputs.slugs }}"
          FIRST_SLUG=$(echo "$SLUGS" | awk '{print $1}')
          echo "Waiting 120s for Cloudflare Pages deployment..."
          sleep 120
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://landscape.jimmysong.io/data/ai-projects-manifest.json")
            if [ "$HTTP" = "200" ]; then
              echo "Manifest is live (attempt $i)"
            fi
            # Verify projects.json contains the new slug
            if [ -n "$FIRST_SLUG" ]; then
              FOUND=$(curl -s "https://landscape.jimmysong.io/exports/projects.json" 2>/dev/null | \
                python3 -c "import sys,json;data=json.load(sys.stdin);print('yes' if any(p.get('slug')=='$FIRST_SLUG' for p in data) else 'no')" 2>/dev/null || echo "error")
              if [ "$FOUND" = "yes" ]; then
                echo "✅ projects.json confirmed live with slug: $FIRST_SLUG"
                break
              else
                echo "Attempt $i: projects.json not yet updated (slug $FIRST_SLUG $FOUND), retrying in 30s..."
              fi
            else
              [ "$HTTP" = "200" ] && break
              echo "Attempt $i: manifest not yet live (HTTP $HTTP), retrying in 30s..."
            fi
            sleep 30
          done

      - name: Trigger scoring for new/changed projects
        if: steps.detect.outputs.changed == 'true'
        run: |
          SLUGS="${{ steps.detect.outputs.slugs }}"
          if [ -z "$SLUGS" ]; then
            echo "No specific slugs detected, skipping."
            exit 0
          fi

          echo "Generating scoring data for: $SLUGS"
          for slug in $SLUGS; do
            echo "  → $slug"
            REPO=$(curl -sf "https://landscape.jimmysong.io/exports/projects.json" 2>/dev/null | \
              python3 -c "import sys,json;[print(p.get('repo','').replace('https://github.com/',''))for p in json.load(sys.stdin)if p.get('slug')=='$slug']" 2>/dev/null || true)
            if [ -n "$REPO" ]; then
              echo "    Repo: $REPO"
              curl -sf "https://ai-oss-rank-worker.jimmysong.io/recalculate?repo=$REPO" -o /dev/null 2>&1 && \
                echo "    ✅ Scoring generated" || echo "    ⚠️ Scoring failed"
            else
              echo "    ⚠️ Could not resolve repo for slug: $slug — deployment may not be live yet"
            fi
          done
