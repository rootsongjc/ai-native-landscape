name: health-check

on:
  schedule:
    # Run every Monday at 3:22 UTC (off-peak to avoid API congestion)
    - cron: '22 3 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no file changes)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - name: Run health check
        id: health
        env:
          GITHUB_TOKEN: ${{ secrets.HEALTH_CHECK }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          node scripts/health-check.mjs $ARGS || echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Validate after changes
        if: steps.health.outputs.has_changes == 'true'
        run: npm run validate

      - name: Create PR for status changes
        if: steps.health.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: health-check/update-status
          title: '🪦 health-check: update project statuses'
          body: |
            Automated health check detected project status changes.

            This PR updates project statuses based on GitHub repo availability:
            - `unavailable` — repo returns 404 (deleted or suspended)
            - `archived` — repo is archived on GitHub

            Generated by `health-check` workflow.
          commit-message: 'chore: update project statuses from health check'
          labels: health-check, automated
